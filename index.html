<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Simulador de nómina</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --line: #d8e2ef;
      --text: #172033;
      --muted: #627089;
      --primary: #1d4ed8;
      --primary-2: #2563eb;
      --ok: #166534;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 20px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    h1 {
      font-size: 1.9rem;
      margin-bottom: 8px;
    }

    .lead {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .subsection {
      margin-top: 18px;
    }

    .subsection h3 {
      font-size: 1rem;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }

    .grid-2, .grid-3 {
      display: grid;
      gap: 14px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.93rem;
      font-weight: 700;
    }

    input, select {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid #c8d6e8;
      border-radius: 14px;
      background: white;
      font: inherit;
      color: var(--text);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primargrid-template-columns: 1fr;, 235, 0.10);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 14px;
  ition: transform .15s ease, box-shadow .15s ease;
    }

    button:hover { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      box-shadow: 0 10px 22px rgba(37,99,235,.18);
    }

    .btn-secondary {
      background: #e8edf7;
      color: var(--text);
    }

    .btn-outline {
      background: white;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px;
      background: linear-gradient(180deg, #fff, #f9fbff);
    }

    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: .86rem;
      margin-bottom: 7px;
    }

    .summary-card strong {
      font-size: 1.2rem;
      font-variant-numeric: tabular-nums;
    }

    .payroll {
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: white;
    }

    .payroll-header {
      background: #f7faff;
      border-bottom: 1px solid var(--line);
      padding: 18px;
    }

    .payroll-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 18px;
      font-size: .95rem;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }

    th {
      background: #f9fbff;
      color: #334155;
      font-size: 0.88rem;
    }

    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tfoot td {
      font-weight: 800;
      background: #fcfdff;
    }

    .liquido {
      padding: 16px 18px;
      background: #f0fdf4;
      border-top: 1px solid var(--line);
      font-size: 1.08rem;
      font-weight: 800;
      color: var(--ok);
    }

    .saved-box {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .saved-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fafcff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      flex-wrap: wrap;
    }

    .small {
      color: var(--muted);
      font-size: .88rem;
    }

    @media (max-width: 860px) {
      .grid-2, .grid-3, .summary, .payroll-meta {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      .buttons, .saved-section { display: none !important; }
      body { background: white; }
      .panel { box-shadow: none; border: 0; padding: 0; }
